# KRON Nano — Default configuration
#
# Copy this file to /etc/kron/kron.toml and edit the marked required fields.
# All paths are for Linux. On Windows substitute C:\ProgramData\kron.
#
# Required changes before first run:
#   1. auth.jwt_private_key_path / jwt_public_key_path
#   2. auth.jwt_private_key_path must point to a 2048-bit RSA key pair
#      Generate: openssl genrsa -out /etc/kron/jwt.key 2048
#               openssl rsa -in /etc/kron/jwt.key -pubout -out /etc/kron/jwt.pub
#   3. alert.* notification credentials (WhatsApp / SMTP / SMS)

# ── Deployment mode ────────────────────────────────────────────────────────────
mode = "nano"

# ── DuckDB storage (embedded, no ClickHouse required) ─────────────────────────
[duckdb]
path                       = "/var/lib/kron/data/events.duckdb"
memory_limit_mb            = 2048       # 2 GB; increase on nodes with more RAM
threads                    = 4
migrations_dir             = "/etc/kron/migrations"
cold_archive_dir           = "/var/lib/kron/archive"
cold_storage_retention_days = 180       # CERT-In requirement: 180-day hot tier
cold_archive_interval_hours = 24

# ── Embedded message bus (no Redpanda required) ────────────────────────────────
[embedded_bus]
data_dir                   = "/var/lib/kron/bus"
max_wal_size_mb            = 512
sync_writes                = true
max_retry_count            = 3
backpressure_lag_threshold = 100000

# ── Authentication ─────────────────────────────────────────────────────────────
[auth]
jwt_private_key_path   = "/etc/kron/jwt.key"      # REQUIRED — RSA-2048 private key PEM
jwt_public_key_path    = "/etc/kron/jwt.pub"       # REQUIRED — RSA-2048 public key PEM
jwt_expiry_secs        = 28800                     # 8 hours
max_failed_attempts    = 5
lockout_duration_secs  = 900                       # 15 minutes

# ── Collector ─────────────────────────────────────────────────────────────────
[collector]
grpc_addr              = "0.0.0.0:50051"
http_addr              = "0.0.0.0:8081"
syslog_udp_addr        = "0.0.0.0:514"
syslog_tcp_addr        = "0.0.0.0:6514"
heartbeat_timeout_secs = 90
metrics_addr           = "0.0.0.0:9101"

# ── Normalizer ────────────────────────────────────────────────────────────────
[normalizer]
# Comma-separated tenant UUIDs to consume from the bus.
raw_tenant_ids         = []
geoip_db_path          = "/var/lib/kron/GeoLite2-City.mmdb"
asset_cache_ttl_secs   = 300
asset_cache_size       = 10000
metrics_addr           = "0.0.0.0:9102"

# ── Alert engine ──────────────────────────────────────────────────────────────
[alert]
# WhatsApp Business API (primary notification channel)
whatsapp_token         = ""            # REQUIRED for notifications
whatsapp_phone_id      = ""            # REQUIRED for notifications
# SMS fallback (optional)
sms_api_key            = ""
sms_sender_id          = "KRNSEC"
# Email fallback (optional)
smtp_host              = "smtp.example.com"
smtp_port              = 587
smtp_username          = ""
smtp_password          = ""
smtp_from              = "alerts@kron.local"
# Rate limiting
max_notifications_per_hour = 10       # for P3+ severity; P1/P2 always immediate

# ── Query API ─────────────────────────────────────────────────────────────────
[api]
listen_addr            = "0.0.0.0:8080"
max_body_bytes         = 10485760      # 10 MiB
cors_origins           = ["*"]         # Restrict in production

# ── Telemetry ─────────────────────────────────────────────────────────────────
[telemetry]
log_level              = "info"
metrics_addr           = "0.0.0.0:9101"
