name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Step 1: Build kron-nano.exe, then embed it into kron-nano-setup.exe ─────
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout kron-nano
        uses: actions/checkout@v4
        with:
          path: kron-nano

      - name: Checkout kron-core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/kron-core
          token: ${{ secrets.GITHUB_TOKEN }}
          path: kron-core

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kron-nano/target
          key: windows-cargo-${{ hashFiles('kron-nano/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install CMake (DuckDB bundled build)
        uses: lukka/get-cmake@latest

      # ── 1a. Build the service binary ────────────────────────────────────────
      - name: Build kron-nano.exe
        working-directory: kron-nano
        run: cargo build --release --package kron-nano
        env:
          CARGO_PROFILE_RELEASE_LTO: thin
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1

      # ── 1b. Build the installer — embed kron-nano.exe inside it ─────────────
      - name: Build kron-nano-setup.exe (embeds kron-nano.exe)
        working-directory: kron-nano
        run: cargo build --release --package kron-nano-setup
        env:
          # build.rs reads this to locate the binary to embed
          KRON_NANO_BIN: ${{ github.workspace }}\kron-nano\target\release\kron-nano.exe
          CARGO_PROFILE_RELEASE_LTO: thin
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1

      # ── Rename outputs ───────────────────────────────────────────────────────
      - name: Prepare release assets
        run: |
          $base = "kron-nano\target\release"
          Copy-Item "$base\kron-nano.exe"       "kron-nano-windows-x86_64.exe"
          Copy-Item "$base\kron-nano-setup.exe" "kron-nano-setup.exe"

      - name: Upload kron-nano binary
        uses: actions/upload-artifact@v4
        with:
          name: kron-nano-windows-x86_64
          path: kron-nano-windows-x86_64.exe
          retention-days: 7

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: kron-nano-setup
          path: kron-nano-setup.exe
          retention-days: 7

  # ── Step 2: Smoke-test the installer binary ───────────────────────────────
  smoke-test:
    name: Smoke test
    needs: build-windows
    runs-on: windows-latest

    steps:
      - name: Download setup artifact
        uses: actions/download-artifact@v4
        with:
          name: kron-nano-setup

      - name: Verify installer is a valid PE
        run: |
          # Check the PE magic bytes (MZ header)
          $bytes = [System.IO.File]::ReadAllBytes("kron-nano-setup.exe")
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            Write-Error "Not a valid Windows PE file"
            exit 1
          }
          Write-Host "PE header OK — installer is a valid .exe"
          $size = (Get-Item kron-nano-setup.exe).Length / 1MB
          Write-Host "Size: $([math]::Round($size, 1)) MB"
        shell: pwsh

  # ── Step 3: Publish GitHub Release with all assets ───────────────────────
  release:
    name: Publish Release
    needs: [build-windows, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout kron-nano
        uses: actions/checkout@v4
        with:
          path: kron-nano

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -name "*.exe" | sort | xargs sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Copy extra installer files
        run: |
          cp kron-nano/deploy/nano/uninstall.ps1 artifacts/
          cp kron-nano/deploy/nano/install.ps1   artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: KRON Nano ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          body: |
            ## KRON Nano ${{ steps.version.outputs.tag }}

            Single-binary SIEM — DuckDB embedded, zero infrastructure required.

            ### Windows — One Click Install

            1. Download **`kron-nano-setup.exe`** below
            2. Double-click → approve the UAC prompt
            3. Done — browser opens at `http://localhost:8080`

            The installer is self-contained. It extracts `kron-nano.exe`, generates JWT keys,
            writes a default config, registers a Windows Service, and opens your browser.
            No internet connection required after download.

            ### PowerShell alternative (run as Administrator)
            ```powershell
            irm https://github.com/${{ github.repository }}/releases/latest/download/install.ps1 | iex
            ```

            ### Uninstall
            ```powershell
            powershell -ExecutionPolicy Bypass -File uninstall.ps1
            # Keep data:  ... -File uninstall.ps1 -KeepData
            ```

            ### Verify integrity
            ```powershell
            (Get-FileHash kron-nano-setup.exe -Algorithm SHA256).Hash
            # Compare with SHA256SUMS.txt
            ```
          files: |
            artifacts/kron-nano-setup/kron-nano-setup.exe
            artifacts/kron-nano-windows-x86_64/kron-nano-windows-x86_64.exe
            artifacts/uninstall.ps1
            artifacts/install.ps1
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
