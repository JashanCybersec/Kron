# KRON QA Environment
#
# Minimal compose file for CI integration tests.
# No observability stack — only the services that tests require.
#
# In GitHub Actions, these are provided as native service containers
# (see .github/workflows/ci.yml). This file serves as reference and
# can be used to run integration tests locally against a fresh state.
#
# Usage:
#   docker compose -f deploy/compose/docker-compose.qa.yml up -d
#   cargo test --workspace -- --include-ignored integration
#   docker compose -f deploy/compose/docker-compose.qa.yml down -v

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: kron-clickhouse-qa
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: kron_test
      CLICKHOUSE_USER: kron
      CLICKHOUSE_PASSWORD: test
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  redpanda:
    image: redpandadata/redpanda:v23.3.11
    container_name: kron-redpanda-qa
    command:
      - redpanda
      - start
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
