global:
  scrape_interval: 15s
  evaluation_interval: 15s

# KRON services expose metrics at /metrics on their metrics port.
# host.docker.internal resolves to the host machine from inside Docker.
# Update targets as services are implemented in Phase 1+.

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

